name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: cello-practise

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # secrets 上下文不能用在 step 的 if 里，先在 shell 里探测
      - name: Check Docker Hub credentials
        id: creds
        env:
          DU: ${{ secrets.DOCKER_USERNAME }}
          DP: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DU" ] && [ -n "$DP" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未配置 DOCKER_USERNAME/DOCKER_PASSWORD secrets——跳过推送，仅做构建验证"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && steps.creds.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        if: github.event_name != 'pull_request' && steps.creds.outputs.available == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request' && steps.creds.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # 无 Docker Hub 凭据（或 PR）时：只验证镜像能构建，不推送
      - name: Build only (no push)
        if: github.event_name == 'pull_request' || steps.creds.outputs.available != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
