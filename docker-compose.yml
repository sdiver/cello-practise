services:
  cello-practise:
    build:
      context: .
      dockerfile: Dockerfile
    image: cello-practise:latest
    container_name: cello-practise
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # 上传文件：MIDI / MusicXML / PDF / 图片
      - ./uploads:/app/uploads
      # SQLite 数据库
      - ./data:/app/data
      # 后端环境变量（含 ANTHROPIC_API_KEY 等）
      - ./backend/.env:/app/backend/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cello-network

networks:
  cello-network:
    driver: bridge
