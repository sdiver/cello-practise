<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进步追踪 - AI大提琴私教</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f39c12;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        .practice-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .practice-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .practice-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .practice-score {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .practice-score.high { background: rgba(39,174,96,0.2); color: #27ae60; }
        .practice-score.medium { background: rgba(243,156,18,0.2); color: #f39c12; }
        .practice-score.low { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .practice-info {
            flex: 1;
        }
        .practice-title {
            font-weight: 500;
            margin-bottom: 3px;
        }
        .practice-date {
            font-size: 0.85rem;
            color: #666;
        }
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 20px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tab:hover { color: #fff; }
        .filter-tab.active {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎻 AI大提琴私教</h1>
            <p class="tagline">像有私教陪练一样，每天都有进步</p>
            <div id="user-info" style="position: absolute; top: 20px; right: 20px; display: none;">
                <span id="user-name"></span>
                <button onclick="logout()" style="margin-left: 10px; padding: 5px 10px; font-size: 0.8rem;">退出</button>
            </div>
        </header>

        <nav class="nav-bar">
            <a href="/" class="nav-btn">📊 今日概览</a>
            <a href="/tuner" class="nav-btn">🎵 调音器</a>
            <a href="/practice" class="nav-btn">🎯 AI陪练</a>
            <a href="/sheets" class="nav-btn">📚 琴谱库</a>
            <a href="/progress" class="nav-btn active">📈 进步追踪</a>
            <a href="/qa" class="nav-btn">💬 问AI教练</a>
        </nav>

        <!-- 统计概览 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-sessions">0</div>
                <div class="stat-label">总练习次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-duration">0h</div>
                <div class="stat-label">总练习时长</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-score">0</div>
                <div class="stat-label">平均得分</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="practice-days">0</div>
                <div class="stat-label">练习天数</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <!-- 左侧：图表 -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="card-title" style="margin: 0;">📈 进步曲线</div>
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="changePeriod(7, this)">7天</button>
                        <button class="filter-tab" onclick="changePeriod(30, this)">30天</button>
                        <button class="filter-tab" onclick="changePeriod(90, this)">90天</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="progress-chart"></canvas>
                </div>
            </div>

            <!-- 右侧：最近练习 -->
            <div class="card">
                <div class="card-title">📝 最近练习</div>
                <div class="practice-list" id="practice-list">
                    <div style="text-align: center; padding: 40px; color: #888;">暂无练习记录</div>
                </div>
            </div>
        </div>

        <!-- 曲目统计 -->
        <div class="card">
            <div class="card-title">🎼 曲目练习统计</div>
            <div id="sheet-stats">
                <div style="text-align: center; padding: 40px; color: #888;">暂无数据</div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let progressChart = null;
        let currentPeriod = 7;
        const userId = getCurrentUserId();

        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkLogin();
            if (user) {
                showUserInfo(user);
                await loadStats(user.id, currentPeriod);
                await loadRecentPractices(user.id);
            } else {
                document.querySelector('.stats-grid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">请先<a href="/" style="color: #f39c12;">登录</a>查看进度</div>';
            }
        });

        async function loadStats(userId, period) {
            try {
                const stats = await api.getPracticeStats(userId, period);

                // 更新概览
                if (stats.overall) {
                    document.getElementById('total-sessions').textContent = stats.overall.total_sessions || 0;
                    document.getElementById('total-duration').textContent = formatHours(stats.overall.total_duration);
                    document.getElementById('avg-score').textContent = Math.round(stats.overall.avg_score || 0);
                    document.getElementById('practice-days').textContent = stats.overall.practice_days || 0;
                }

                // 渲染图表
                renderChart(stats.daily || []);

                // 渲染曲目统计
                renderSheetStats(stats.sheets || []);

            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }

        function formatHours(seconds) {
            if (!seconds) return '0h';
            const hours = Math.floor(seconds / 3600);
            if (hours < 1) {
                return Math.floor(seconds / 60) + 'm';
            }
            return hours + 'h';
        }

        function renderChart(dailyData) {
            const ctx = document.getElementById('progress-chart');
            if (!ctx) return;

            if (progressChart) {
                progressChart.destroy();
            }

            const labels = dailyData.map(d => {
                const date = new Date(d.practice_date);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            });
            const scores = dailyData.map(d => Math.round(d.avg_score || 0));

            progressChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '平均得分',
                        data: scores,
                        borderColor: '#f39c12',
                        backgroundColor: 'rgba(243,156,18,0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#f39c12',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        async function loadRecentPractices(userId) {
            try {
                const result = await api.getPracticeRecords(userId, { limit: 10 });
                const list = document.getElementById('practice-list');

                if (result.data.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">暂无练习记录</div>';
                    return;
                }

                list.innerHTML = result.data.map(p => {
                    const scoreClass = p.total_score >= 80 ? 'high' : p.total_score >= 60 ? 'medium' : 'low';
                    return `
                        <div class="practice-item">
                            <div class="practice-score ${scoreClass}">${p.total_score || '--'}</div>
                            <div class="practice-info">
                                <div class="practice-title">${p.sheet_title || '未知曲目'}</div>
                                <div class="practice-date">${formatDate(p.created_at)} · ${formatDuration(p.duration)}</div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('加载练习记录失败:', err);
            }
        }

        function renderSheetStats(sheets) {
            const container = document.getElementById('sheet-stats');
            if (sheets.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #888;">暂无数据</div>';
                return;
            }

            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>曲目</th>
                            <th>练习次数</th>
                            <th>平均得分</th>
                            <th>最佳得分</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sheets.map(s => `
                            <tr>
                                <td>
                                    <div style="font-weight: 500;">${s.title}</div>
                                    <div style="font-size: 0.85rem; color: #666;">${s.composer || '未知作曲家'}</div>
                                </td>
                                <td>${s.practice_count}次</td>
                                <td><span style="color: ${s.avg_score >= 80 ? '#27ae60' : s.avg_score >= 60 ? '#f39c12' : '#e74c3c'}">${Math.round(s.avg_score || 0)}分</span></td>
                                <td>${Math.round(s.best_score || 0)}分</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function changePeriod(period, btn) {
            currentPeriod = period;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            const user = checkLogin();
            if (user) {
                await loadStats(user.id, period);
            }
        }
    </script>
</body>
</html>
