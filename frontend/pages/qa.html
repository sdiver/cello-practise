<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问AI教练 - AI大提琴私教</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .qa-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            height: calc(100vh - 200px);
        }
        @media (max-width: 768px) {
            .qa-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        /* 侧边栏 */
        .sidebar {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h3 {
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .quick-questions {
            list-style: none;
            padding: 0;
        }
        .quick-questions li {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .quick-questions li:hover {
            background: rgba(243,156,18,0.2);
            color: #f39c12;
        }

        /* 聊天区域 */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
        }
        .chat-header {
            padding: 15px 20px;
            background: rgba(243,156,18,0.1);
            border-bottom: 1px solid rgba(243,156,18,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .chat-header .info {
            flex: 1;
        }
        .chat-header .name {
            font-weight: 500;
        }
        .chat-header .status {
            font-size: 0.8rem;
            color: #27ae60;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .chat-input-area {
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.ai .avatar {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
        }
        .message.user .avatar {
            background: rgba(255,255,255,0.1);
        }
        .message .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.ai .bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            border-bottom-right-radius: 4px;
        }
        .message .time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
        }

        /* 思考中 */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            width: fit-content;
        }
        .thinking-dots {
            display: flex;
            gap: 4px;
        }
        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: #f39c12;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .welcome-message h2 {
            color: #f39c12;
            margin-bottom: 10px;
        }
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .chip {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .chip:hover {
            background: rgba(243,156,18,0.2);
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎻 AI大提琴私教</h1>
            <p class="tagline">像有私教陪练一样，每天都有进步</p>
            <div id="user-info" style="position: absolute; top: 20px; right: 20px; display: none;">
                <span id="user-name"></span>
                <button onclick="logout()" style="margin-left: 10px; padding: 5px 10px; font-size: 0.8rem;">退出</button>
            </div>
        </header>

        <nav class="nav-bar">
            <a href="/" class="nav-btn">📊 今日概览</a>
            <a href="/tuner" class="nav-btn">🎵 调音器</a>
            <a href="/practice" class="nav-btn">🎯 AI陪练</a>
            <a href="/sheets" class="nav-btn">📚 琴谱库</a>
            <a href="/progress" class="nav-btn">📈 进步追踪</a>
            <a href="/qa" class="nav-btn active">💬 问AI教练</a>
        </nav>

        <div class="qa-layout">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <h3>💡 常见问题</h3>
                <ul class="quick-questions">
                    <li onclick="quickAsk('如何正确持弓？')">如何正确持弓？</li>
                    <li onclick="quickAsk('左手手指按弦技巧')">左手手指按弦技巧</li>
                    <li onclick="quickAsk('推荐初学者练习曲')">推荐初学者练习曲</li>
                    <li onclick="quickAsk('怎样改善音准？')">怎样改善音准？</li>
                    <li onclick="quickAsk('换把位练习方法')">换把位练习方法</li>
                    <li onclick="quickAsk('揉弦技巧教学')">揉弦技巧教学</li>
                </ul>

                <h3 style="margin-top: 25px;">🎯 练习建议</h3>
                <ul class="quick-questions">
                    <li onclick="quickAsk('每日练习时间安排')">每日练习时间安排</li>
                    <li onclick="quickAsk('如何制定练习计划')">如何制定练习计划</li>
                    <li onclick="quickAsk('考前如何突击')">考前如何突击</li>
                </ul>
            </div>

            <!-- 聊天区域 -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="avatar">🎓</div>
                    <div class="info">
                        <div class="name">AI大提琴教练</div>
                        <div class="status">● 在线</div>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="welcome-message">
                        <h2>👋 你好！我是你的 AI 大提琴教练</h2>
                        <p>我可以帮你解答关于大提琴演奏技巧、乐理知识、练习方法等问题</p>
                        <div class="suggestion-chips">
                            <span class="chip" onclick="quickAsk('如何持弓？')">如何持弓？</span>
                            <span class="chip" onclick="quickAsk('音阶练习方法')">音阶练习方法</span>
                            <span class="chip" onclick="quickAsk('推荐练习曲目')">推荐练习曲目</span>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const userId = getCurrentUserId();
        const sessionId = 'qa-' + new Date().toISOString().split('T')[0];

        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkLogin();
            if (user) {
                showUserInfo(user);
                await loadChatHistory();
            }
        });

        async function loadChatHistory() {
            if (!userId) return;

            try {
                const history = await api.getChatHistory(userId, sessionId);
                const container = document.getElementById('chat-messages');

                if (history.length > 0) {
                    container.innerHTML = '';
                    history.forEach(msg => {
                        addMessage(msg.content, msg.role === 'user' ? 'user' : 'ai', false);
                    });
                    scrollToBottom();
                }
            } catch (err) {
                console.error('加载历史记录失败:', err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage(text, 'user');
            input.value = '';

            // 显示思考中
            showThinking();

            try {
                const result = await api.chatWithAI(text, userId, sessionId);
                removeThinking();
                addMessage(result.response, 'ai');
            } catch (err) {
                removeThinking();
                addMessage('抱歉，AI服务暂时不可用，请稍后再试。', 'ai');
                console.error('发送消息失败:', err);
            }
        }

        function quickAsk(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        function addMessage(text, sender, animate = true) {
            const container = document.getElementById('chat-messages');

            // 清除欢迎消息
            if (container.querySelector('.welcome-message')) {
                container.innerHTML = '';
            }

            const message = document.createElement('div');
            message.className = `message ${sender}${animate ? '' : ''}`;
            message.innerHTML = `
                <div class="avatar">${sender === 'ai' ? '🎓' : '👤'}</div>
                <div>
                    <div class="bubble">${escapeHtml(text)}</div>
                    <div class="time">${new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'})}</div>
                </div>
            `;

            container.appendChild(message);
            scrollToBottom();
        }

        function showThinking() {
            const container = document.getElementById('chat-messages');
            const thinking = document.createElement('div');
            thinking.id = 'thinking-indicator';
            thinking.className = 'message ai';
            thinking.innerHTML = `
                <div class="avatar">🎓</div>
                <div class="thinking">
                    <div class="thinking-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span>思考中...</span>
                </div>
            `;
            container.appendChild(thinking);
            scrollToBottom();
        }

        function removeThinking() {
            const thinking = document.getElementById('thinking-indicator');
            if (thinking) {
                thinking.remove();
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
